<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jexor - Voice Cloning</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      color: #333;
      text-align: center;
      padding: 60px 20px;
    }
    h1 {
      color: #4a6cf7;
      font-size: 3rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.3rem;
      color: #666;
      margin-bottom: 40px;
    }
    .btn {
      background: #4a6cf7;
      color: white;
      padding: 16px 32px;
      font-size: 1.2rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin: 15px;
    }
    .btn:hover {
      background: #3a5bd6;
    }
    .upload-box {
      border: 3px dashed #4a6cf7;
      border-radius: 15px;
      padding: 50px;
      margin: 30px auto;
      max-width: 500px;
      background: white;
    }
  </style>
</head>
<body>
  <h1>Jexor</h1>
  <p>Clone voices in seconds</p>

  <div class="upload-box">
    <h2>Upload Voice Sample</h2>
    <p>Upload 15-30 seconds of clear voice</p>
    <button class="btn">Choose Audio File</button>
  </div>

  <button class="btn">Talk with My Voice</button>
</body>
</html>
