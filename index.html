<body class="bg-zinc-50 text-zinc-900 overflow-x-hidden">

  <!-- HERO -->
  <section class="hero-bg min-h-screen flex items-center pt-24">

    <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-14 items-center">

      <div>

        <div class="inline-flex items-center gap-2 bg-yellow-100 text-yellow-700 px-4 py-2 rounded-full text-sm font-medium mb-6">

        </div>

          Clone Voices
          <br />
          In Seconds

        <p class="mt-6 text-xl text-zinc-600 max-w-xl leading-relaxed">
          Create hyper-realistic AI voices with only 30 seconds of audio. Text to speech

        </p>

        <div class="mt-10 flex flex-wrap gap-4">

             class="px-8 py-5 bg-yellow-400 hover:bg-yellow-300 rounded-3xl text-lg font-semibold flex items-center gap-3 transition">

            <i class="fa-solid fa-arrow-right"></i>
          </a>

            Watch Demo
          </button>

        </div>

      </div>

      <!-- RIGHT -->
      <div class="relative">

        <div class="glass border border-white rounded-[40px] p-8 shadow-2xl">

          <div class="flex items-center justify-between mb-8">
            <div>
              <h2 class="text-2xl font-semibold">
                Voice Studio
              </h2>
              <p class="text-zinc-500">
                AI generated voices
              </p>
            </div>

            <div class="w-14 h-14 rounded-2xl bg-yellow-400 flex items-center justify-center">
              <i class="fa-solid fa-microphone text-2xl"></i>
            </div>
          </div>

          <div class="space-y-5">

            <div class="bg-white rounded-3xl p-5 border border-zinc-100">
              <div class="flex justify-between mb-3">
                <span class="font-medium">Voice Accuracy</span>
                <span class="text-yellow-600 font-semibold">98%</span>
              </div>

              <div class="w-full bg-zinc-100 rounded-full h-3">
                <div class="bg-yellow-400 h-3 rounded-full w-[98%]"></div>
              </div>
            </div>

            <div class="bg-white rounded-3xl p-5 border border-zinc-100">
              <div class="flex justify-between mb-3">
                <span class="font-medium">Training Speed</span>
                <span class="text-green-600 font-semibold">Fast</span>
              </div>

              <div class="flex gap-1 items-end h-12">
                <div class="w-2 bg-yellow-300 h-4 rounded-full"></div>
                <div class="w-2 bg-yellow-400 h-7 rounded-full"></div>
                <div class="w-2 bg-yellow-500 h-10 rounded-full"></div>
                <div class="w-2 bg-yellow-400 h-6 rounded-full"></div>
                <div class="w-2 bg-yellow-300 h-4 rounded-full"></div>

            </div>
