<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jexor Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
</style>

</head>

<body class="bg-zinc-50">

<div class="min-h-screen grid md:grid-cols-2">

  <!-- LEFT SIDE -->
  <div class="hidden md:flex items-center justify-center bg-yellow-400 p-10">
    <div class="max-w-md text-black">
      <h1 class="text-5xl font-bold mb-6">Jexor</h1>
      <p class="text-lg">
        Create powerful AI voices, generate speech instantly,
        and build your own voice studio.
      </p>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="flex items-center justify-center p-6">

    <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl">

      <h2 class="text-3xl font-semibold mb-2">Welcome back</h2>
      <p class="text-zinc-500 mb-6">Login to your account</p>

      <!-- EMAIL -->
      <input id="email" type="email" placeholder="Email"
      class="w-full border p-4 rounded-xl mb-3 focus:outline-none focus:border-yellow-400">

      <!-- PASSWORD -->
      <input id="password" type="password" placeholder="Password"
      class="w-full border p-4 rounded-xl mb-4 focus:outline-none focus:border-yellow-400">

      <!-- LOGIN BUTTON -->
      <button onclick="login()"
      class="bg-yellow-400 w-full py-3 rounded-xl font-semibold hover:bg-yellow-300 transition mb-3">
        Login
      </button>

      <!-- SIGNUP BUTTON -->
      <button onclick="signup()"
      class="bg-zinc-900 text-white w-full py-3 rounded-xl font-semibold hover:bg-black transition">
        Create Account
      </button>

      <!-- DIVIDER -->
      <div class="flex items-center my-6">
        <div class="flex-1 h-px bg-zinc-200"></div>
        <span class="px-3 text-sm text-zinc-400">or</span>
        <div class="flex-1 h-px bg-zinc-200"></div>
      </div>

      <!-- GOOGLE LOGIN -->
      <button onclick="googleLogin()"
      class="w-full border py-3 rounded-xl flex items-center justify-center gap-3 hover:bg-zinc-100 transition">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5">
        Continue with Google
      </button>

      <p id="msg" class="text-sm mt-4 text-center text-red-500"></p>

    </div>

  </div>

</div>

<script>

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAEJvn3gVNYSw-oStmiBgy1A1fPbXG5NjA",
  authDomain: "jexo-27d9f.firebaseapp.com",
  projectId: "jexo-27d9f",
  storageBucket: "jexo-27d9f.firebasestorage.app",
  messagingSenderId: "233577519756",
  appId: "1:233577519756:web:f685209976e29e2d8179a9"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* AUTO REDIRECT */
auth.onAuthStateChanged(user => {
  if (user) {
    window.location.href = "dashboard.html";
  }
});

/* LOGIN */
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => window.location.href = "dashboard.html")
    .catch(e => showError(e.message));
}

/* SIGNUP */
function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => window.location.href = "dashboard.html")
    .catch(e => showError(e.message));
}

/* GOOGLE LOGIN */
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(() => window.location.href = "dashboard.html")
    .catch(e => showError(e.message));
}

/* ERROR */
function showError(msg) {
  document.getElementById("msg").innerText = msg;
}

</script>

</body>
</html>
